name: GitHub Release

# Fires directly off a pushed v*.*.* tag (created by .github/scripts/release.sh).
# This fork doesn't use upstream's release/<version> branch + Docker Hub pipeline,
# so there's no separate job to wait on - this runs independently of ghcr-publish.yml.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)publish a release for, e.g. v1.3.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        id: validate
        run: .github/scripts/validate_semver.sh "${{ steps.extract.outputs.version }}"

      - name: Extract release notes
        run: .github/scripts/extract_release_notes.sh "${{ steps.extract.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.extract.outputs.version }}
          name: Release ${{ steps.extract.outputs.version }}
          body_path: extracted_release_notes.md
          prerelease: ${{ steps.validate.outputs.is_prerelease }}
          draft: false
